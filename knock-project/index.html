<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>1973: Veda Yolu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="crt">
        <div id="game-container">
            <div id="header">
                <h1>1973: VEDA YOLU</h1>
                <div id="burden-bar-wrapper">
                    <span>Ruhsal Yük:</span>
                    <div id="burden-bar"><div id="burden-fill"></div></div>
                    <span id="burden-score">0</span>%
                </div>
            </div>

            <div id="story-box">
                <p class="system-msg"><em>Yıl 1973. Vietnam'a gitmeden önce annene veda etmek için mutfaktasın...</em></p>
                <p class="npc-msg"><strong>Anne:</strong> "Gitmek zorunda olduğunu biliyorum ama içim elvermiyor evlat. Bana söylemek istediğin son bir şey var mı?"</p>
            </div>

            <div id="input-area">
                <span class="prompt-symbol">&gt;</span>
                <input type="text" id="player-input" autocomplete="off" placeholder="Cevabını yaz..." disabled>
                <button id="send-btn" disabled>Gönder</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
