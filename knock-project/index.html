<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>1973: Veda Yolu</title>
    <link rel="stylesheet" href="styles/main.css">
</head>

<body>
    <div class="crt">
        <div id="game-container">
            <div id="header">
                <h1>1973: VEDA YOLU</h1>
                <div id="hud">
                    <span id="hud-player">ASKER: —</span>
                    <span id="hud-room">KONUM: —</span>
                    <span id="hud-progress">YANSIMALAR: 0/7</span>
                    <span id="hud-controls">[WASD] HAREKET     [E] İNCELE</span>
                </div>
                <div id="burden-bar-wrapper">
                    <span class="bar-label">RUHSAL YÜK</span>
                    <div id="burden-bar"><div id="burden-fill"></div></div>
                    <span id="burden-score">0</span><span class="bar-pct">%</span>
                </div>
            </div>

            <canvas id="game-canvas" tabindex="0"></canvas>

            <div id="api-warning" class="hidden">
                ! GEMINI_API_KEY tanımlı değil — knock-project/.env içine GEMINI_API_KEY=... ekleyip yenile.
            </div>

            <div id="finale-locked"></div>
        </div>

        <div id="ending-overlay">
            <div id="ending-text">
                <p id="ending-text-en"></p>
                <p id="ending-text-tr"></p>
            </div>
        </div>

        <div id="dialog-overlay" class="hidden">
            <div id="dialog-box">
                <div id="dialog-title">—</div>
                <div id="dialog-text"></div>
                <div id="dialog-input-area">
                    <span class="prompt-symbol">&gt;</span>
                    <input id="dialog-input" type="text" autocomplete="off" spellcheck="false" placeholder="ne hissediyorsun?">
                </div>
                <div id="dialog-hint">[ENTER] GÖNDER     [ESC] AYRIL</div>
            </div>
        </div>

        <div id="name-overlay" class="hidden">
            <div id="name-box">
                <p class="name-line">&gt; KAYIT ARŞİVİ — 1973</p>
                <p class="name-line dim">&gt; KİMLİĞİNİ DOĞRULA, ASKER.</p>
                <label for="name-input" class="name-label">ADIN:</label>
                <div class="name-row">
                    <span class="prompt-symbol">&gt;</span>
                    <input id="name-input" type="text" maxlength="20" autocomplete="off" spellcheck="false">
                </div>
                <p id="name-error" class="name-error"></p>
                <button id="name-submit">[ GİRİŞ ]</button>
            </div>
        </div>
    </div>

    <script>
        // Her sayfa yenilemesinde sıfırlama — modül yüklenmeden önce çalışır
        ['knock.playerName', 'knock.burdenScore', 'knock.scores'].forEach((k) => localStorage.removeItem(k));
    </script>
    <script type="module" src="src/main.js"></script>
</body>

</html>
